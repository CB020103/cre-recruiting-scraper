name: Daily CRE Scan

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run directory scraper
        run: python directory_scraper.py
        continue-on-error: true

      - name: Run news monitor
        run: python news_monitor.py
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results-${{ github.run_number }}
          path: output/*.csv
          retention-days: 90
